<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyTUbC8XaYie_B8LFxNA9PO90Cn-2j5ET4IipNMrlzU9kpOsDyzNqSKMQHiKxb3gNYYg/exec';
function getUTM(p){var u=new URLSearchParams(window.location.search);return u.get(p)||'';}
function doSubmit() {
  var name=document.getElementById('fn').value.trim();
  var phone=document.getElementById('fp').value.trim();
  var job=document.getElementById('fj').value.trim();
  var msg=document.getElementById('fm').value.trim();
  var email=document.getElementById('fe').value.trim();
  var course=document.getElementById('fcourse').value;
  if(!name){alert('يرجى إدخال الاسم الكامل');return;}
  if(!phone){alert('يرجى إدخال رقم الجوال');return;}
  if(!email){alert('يرجى إدخال البريد الإلكتروني');return;}
  if(!job){alert('يرجى إدخال الوظيفة / التخصص');return;}
  if(!course){alert('يرجى اختيار البرنامج المطلوب');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='⏳ جاري الإرسال...';
  fetch(SCRIPT_URL,{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      utm_source:getUTM('utm_source')||'direct',
      utm_medium:getUTM('utm_medium')||'',
      utm_campaign:getUTM('utm_campaign')||'data',
      utm_content:getUTM('utm_content')||'',
      name:name,email:email,phone:phone,job:job,message:msg,
      program:course
    })
  }).catch(function(){});
  if(typeof fbq!=='undefined'){fbq('track','Lead',{content_category:'Data Analysis',currency:'SAR'});}
  document.getElementById('formWrap').style.display='none';
  document.getElementById('formSuccess').style.display='block';
  window.dataLayer=window.dataLayer||[];
  window.dataLayer.push({event:'form_success',course:'Data Analysis'});
}
function toggleFaq(el){
  var item=el.parentNode,open=item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(function(i){i.classList.remove('open')});
  if(!open)item.classList.add('open');
}
var obs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});
},{threshold:0.1});
document.querySelectorAll('.rv').forEach(function(el){obs.observe(el);});
document.querySelectorAll('a[href^="#"]').forEach(function(a){
  a.addEventListener('click',function(e){var t=document.querySelector(a.getAttribute('href'));if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}});
});
</script>
